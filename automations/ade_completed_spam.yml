name: "ADE Completed - Spam"
description: "An ADE job has completed"
type: "triage_rule"
triage_ade_complete: true
default_actions: ["ade_auto_review"]
internal_type: "ade_complete_spam"
source: |
  triage.trigger == "ade_complete"
  and (triage.classification.classification =~ "spam" or triage.agents.asa.verdict =~ "spam")
