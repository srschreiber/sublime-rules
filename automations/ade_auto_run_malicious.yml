name: "ADE Auto Run - Malicious"
description: "Run ADE Automatically"
type: "triage_rule"
triage_classification_changes: true
triage_asa_complete: true
active: false
default_actions: ["ade_auto_run"]
source: |
  (triage.trigger == "classification_changes" and triage.classification.classification =~ 'malicious')
  or (triage.trigger == "asa_complete" and agents.asa.verdict =~ "malicious")
