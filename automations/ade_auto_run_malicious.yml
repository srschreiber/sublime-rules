name: "Run ADE Automatically - Malicious"
description: "Run ADE Automatically"
type: "triage_rule"
triage_classification_changes: true
triage_asa_complete: true
internal_type: 'run_ade_automatically_malicious'
active: false
default_actions: ["ade_auto_run"]
source: |
  type.inbound 
  and (
    triage.classification.classification =~ "malicious"
    or triage.agents.asa.verdict =~ "malicious"
  )
  and length(triage.flagged_rules) == 0
