name: "Run ADE Automatically - Graymail"
description: "Run ADE Automatically"
type: "triage_rule"
triage_classification_changes: true
triage_asa_complete: true
active: false
default_actions: ["ade_auto_run"]
internal_type: "run_ade_automatically_graymail"
source: |
  (triage.trigger == "classification_changes" and triage.classification.classification =~ "graymail")
  or (triage.trigger == "asa_complete" and triage.agents.asa.verdict =~ "graymail")
